name: Analyze OpenSim Models

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: analyze (report only) or merge (create model)'
        required: true
        default: 'analyze'

jobs:
  process-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies (7zip)
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Unpack Documentation
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          if [ -f "doc.7z" ]; then
            echo "Found doc.7z. Unpacking..."
            7z x doc.7z -odocs
            echo "Unpacked files:"
            ls docs | head -n 5
          else
            echo "WARNING: doc.7z not found in root!"
          fi

      - name: Run Analysis Script
        run: python3 script_analyze.py

      - name: Commit Results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit."
          else
            git commit -m "Auto-generated analysis report"
            git push
          fi

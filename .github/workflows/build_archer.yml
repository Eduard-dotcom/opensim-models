name: Build Archer Hybrid Model

# –Ч–∞–њ—Г—Б–Ї –њ–Њ –Ї–љ–Њ–њ–Ї–µ –≤—А—Г—З–љ—Г—О
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '–Ш–Љ—П –≤—Л—Е–Њ–і–љ–Њ–≥–Њ —Д–∞–є–ї–∞ (–±–µ–Ј —А–∞—Б—И–Є—А–µ–љ–Є—П)'
        required: true
        default: 'Archer_Hybrid_v2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. –°–Ї–∞—З–Є–≤–∞–µ–Љ —В–≤–Њ–є —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–є —Б–Њ –≤—Б–µ–Љ–Є –Љ–Њ–і–µ–ї—П–Љ–Є
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. –£—Б—В–∞–љ–∞–≤–ї–Є–≤–∞–µ–Љ Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. –°–Њ–Ј–і–∞–µ–Љ —Б–Ї—А–Є–њ—В –Њ–±—К–µ–і–Є–љ–µ–љ–Є—П –њ—А—П–Љ–Њ –љ–∞ –ї–µ—В—Г
      - name: Create Merge Script
        run: |
          cat > merge_script.py << 'EOF'
          import os
          import re

          # –Я—Г—В–Є –Ї —Д–∞–є–ї–∞–Љ –≤ —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–Є
          M7_FILE = "M7_18_Baza.osim"
          M8_FILE = "M8_Caruthers_Scaled_Arms_Corrected_1.osim"
          
          # –Я–Њ–ї—Г—З–∞–µ–Љ –Є–Љ—П –≤—Л—Е–Њ–і–љ–Њ–≥–Њ —Д–∞–є–ї–∞ –Є–Ј –≤–≤–Њ–і–∞ –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—П
          version = os.environ.get('INPUT_VERSION_NAME', 'Archer_Hybrid_v2')
          OUT_FILE = f"{version}.osim"

          print(f"--- Starting Build: {OUT_FILE} ---")

          if not os.path.exists(M7_FILE):
              raise Exception(f"Error: {M7_FILE} not found in repo!")
          if not os.path.exists(M8_FILE):
              raise Exception(f"Error: {M8_FILE} not found in repo!")

          with open(M7_FILE, 'r') as f: m7 = f.read()
          with open(M8_FILE, 'r') as f: m8 = f.read()

          # --- –Ы–Ю–У–Ш–Ъ–Р –Ю–С–™–Х–Ф–Ш–Э–Х–Э–Ш–ѓ ---
          
          # 1. –І–Є—Б—В–Є–Љ M7 (—Г–і–∞–ї—П–µ–Љ –љ–Є–Ј: —В–∞–Ј, –љ–Њ–≥–Є)
          # –Ю—Б—В–∞–≤–ї—П–µ–Љ –≤—Б—С –і–Њ lumbar5 –≤–Ї–ї—О—З–Є—В–µ–ї—М–љ–Њ.
          bodies_remove_m7 = ['sacrum', 'pelvis', 'femur_r', 'femur_l', 'tibia_r', 'tibia_l', 
                              'talus_r', 'talus_l', 'calcn_r', 'calcn_l', 'toes_r', 'toes_l', 'patella_r', 'patella_l']
          
          clean_m7 = m7
          for b in bodies_remove_m7:
              pattern = r'<Body\s+name="' + b + r'".*?</Body>'
              clean_m7 = re.sub(pattern, '', clean_m7, flags=re.DOTALL)
              print(f"Removed form M7: {b}")

          # –£–і–∞–ї—П–µ–Љ —Б—Г—Б—В–∞–≤—Л –љ–Є–Ј–∞ –Є–Ј M7
          joints_remove_m7 = ['ground_pelvis', 'pelvis_sacrum', 'hip_r', 'hip_l', 'knee_r', 'knee_l', 
                              'ankle_r', 'ankle_l', 'subtalar_r', 'subtalar_l', 'mtp_r', 'mtp_l']
          for j in joints_remove_m7:
              pattern = r'<\w+Joint\s+name="' + j + r'".*?</\w+Joint>'
              clean_m7 = re.sub(pattern, '', clean_m7, flags=re.DOTALL)

          # 2. –Т—Л—А–µ–Ј–∞–µ–Љ –љ–Є–Ј –Є–Ј M8 (—В–∞–Ј, –љ–Њ–≥–Є, –Ї—А–µ—Б—В–µ—Ж)
          # –Э–∞–Љ –љ—Г–ґ–љ—Л: pelvis, sacrum –Є –љ–Њ–≥–Є.
          bodies_keep_m8 = ['pelvis', 'sacrum', 'femur_r', 'femur_l', 'tibia_r', 'tibia_l', 
                            'talus_r', 'talus_l', 'calcn_r', 'calcn_l', 'toes_r', 'toes_l', 'patella_r', 'patella_l']
          
          extracted_bodies = ""
          for b in bodies_keep_m8:
              # –Ш—Й–µ–Љ –±–ї–Њ–Ї Body
              match = re.search(r'(<Body\s+name="' + b + r'".*?</Body>)', m8, re.DOTALL)
              if match:
                  extracted_bodies += "\n\t\t\t" + match.group(1)
                  print(f"Extracted from M8: {b}")

          joints_keep_m8 = ['ground_pelvis', 'pelvis_sacrum', 'hip_r', 'hip_l', 'knee_r', 'knee_l', 
                            'ankle_r', 'ankle_l', 'subtalar_r', 'subtalar_l', 'mtp_r', 'mtp_l']
          
          extracted_joints = ""
          for j in joints_keep_m8:
              # –Ш—Й–µ–Љ —А–∞–Ј–љ—Л–µ —В–Є–њ—Л —Б—Г—Б—В–∞–≤–Њ–≤
              for tag in ['CustomJoint', 'WeldJoint', 'PinJoint', 'BallJoint']:
                  match = re.search(r'(<' + tag + r'\s+name="' + j + r'".*?</' + tag + r'>)', m8, re.DOTALL)
                  if match:
                      extracted_joints += "\n\t\t\t" + match.group(1)
                      print(f"Extracted joint from M8: {j}")
                      break

          # 3. –°–С–Ю–†–Ъ–Р
          # –Т—Б—В–∞–≤–ї—П–µ–Љ —В–µ–ї–∞ –Є —Б—Г—Б—В–∞–≤—Л –Є–Ј M8 –≤ –Њ—З–Є—Й–µ–љ–љ—Л–є M7
          final_model = clean_m7
          
          if "</BodySet>" in final_model:
              final_model = final_model.replace("</BodySet>", extracted_bodies + "\n\t\t</BodySet>")
          else:
              raise Exception("Could not find </BodySet> in M7")
              
          if "</JointSet>" in final_model:
              final_model = final_model.replace("</JointSet>", extracted_joints + "\n\t\t</JointSet>")
          else:
              raise Exception("Could not find </JointSet> in M7")

          # 4. –°–Њ—Е—А–∞–љ–µ–љ–Є–µ
          with open(OUT_FILE, 'w') as f:
              f.write(final_model)
          
          print(f"SUCCESS! Created {OUT_FILE}")
          EOF

      # 4. –Ч–∞–њ—Г—Б–Ї–∞–µ–Љ —Б–Ї—А–Є–њ—В
      - name: Run Merge Script
        run: python merge_script.py

      # 5. –°–Њ—Е—А–∞–љ—П–µ–Љ —А–µ–Ј—Г–ї—М—В–∞—В –Њ–±—А–∞—В–љ–Њ –≤ —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–є
      - name: Commit and Push Result
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-build: Generated ${{ github.event.inputs.version_name }}.osim"
          file_pattern: "*.osim"
          branch: main

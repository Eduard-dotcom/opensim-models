name: Простой Анализ Кода

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Путь к файлу (например: README.md)'
        required: true
        default: 'README.md'

# Разрешаем читать файлы
permissions:
  contents: read

jobs:
  read_and_analyze:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем ваш репозиторий
      - name: Скачать код
        uses: actions/checkout@v4

      # 2. Читаем файл и сохраняем его содержимое
      - name: Прочитать файл
        id: reader
        run: |
          CONTENT=$(cat "${{ github.event.inputs.file_path }}" || echo "Файл не найден")
          # Экранируем содержимое для JSON
          ESCAPED_CONTENT=$(jq -Rs . <<< "$CONTENT")
          echo "content=$ESCAPED_CONTENT" >> $GITHUB_OUTPUT

      # 3. Отправляем содержимое в БЕСПЛАТНУЮ нейросеть (OpenRouter)
      - name: Спросить у ИИ
        id: ask_ai
        run: |
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{
              "model": "microsoft/phi-3-mini-128k-instruct:free",
              "messages": [
                {"role": "system", "content": "Ты — эксперт по коду. Объясни, что делает этот код, простыми словами, на русском языке."},
                {"role": "user", "content": "Вот содержимое файла: '"${{ steps.reader.outputs.content }}"'"}
              ]
            }')
          echo "ai_response=$RESPONSE" >> $GITHUB_OUTPUT

      # 4. Печатаем ответ ИИ в логах (вы его увидите)
      - name: Показать ответ ИИ
        run: |
          echo "===== ОТВЕТ НЕЙРОСЕТИ ====="
          echo "${{ steps.ask_ai.outputs.ai_response }}"

name: Простой Анализ Кода

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Путь к файлу (например: README.md)'
        required: true
        default: 'README.md'

permissions:
  contents: read

jobs:
  read_and_analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Прочитать файл
        id: reader
        run: |
          if [ -f "${{ github.event.inputs.file_path }}" ]; then
            # Сохраняем содержимое в файл-временный
            cat "${{ github.event.inputs.file_path }}" > /tmp/file_content.txt
            echo "✅ Файл найден"
          else
            echo "❌ Файл не найден: ${{ github.event.inputs.file_path }}"
            exit 1
          fi

      - name: Отправить в нейросеть (упрощённо)
        id: ask_ai
        run: |
          # Читаем файл и экранируем для JSON
          CONTENT=$(cat /tmp/file_content.txt | jq -Rs .)
          
          # Отправляем запрос
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"microsoft/phi-3-mini-128k-instruct:free\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"Ты — эксперт по коду. Объясни, что делает этот код, простыми словами, на русском языке. Если это не код, а текст — просто перескажи его.\"},
                {\"role\": \"user\", \"content\": ${CONTENT}}
              ]
            }")
          
          # Сохраняем ответ
          echo "$RESPONSE" > /tmp/ai_response.txt
          echo "✅ Запрос отправлен"

      - name: Показать ответ ИИ
        run: |
          echo "========================================="
          echo "📄 АНАЛИЗ ФАЙЛА: ${{ github.event.inputs.file_path }}"
          echo "========================================="
          echo ""
          cat /tmp/ai_response.txt | jq -r '.choices[0].message.content' 2>/dev/null || cat /tmp/ai_response.txt
          echo ""
          echo "========================================="
          echo "🔍 Сырой ответ (если не распарсился):"
          echo "========================================="
          cat /tmp/ai_response.txt
